services:
  rancher:
    image: rancher/rancher:stable
    container_name: rancher
    restart: unless-stopped
    privileged: true
    ports:
      - "${RANCHER_HTTP_PORT:-80}:80"
      - "${RANCHER_HTTPS_PORT:-443}:443"
    environment:
      - CATTLE_BOOTSTRAP_PASSWORD=${RANCHER_BOOTSTRAP_PASSWORD:-admin12345}
      - CATTLE_SYSTEM_DEFAULT_REGISTRY=${RANCHER_SYSTEM_REGISTRY:-}
      - CATTLE_SERVER_URL=https://localhost:${RANCHER_HTTPS_PORT:-443}
      - AUDIT_LEVEL=${RANCHER_AUDIT_LEVEL:-0}
    volumes:
      - rancher_data:/var/lib/rancher
    networks:
      - rancher-k3s
    healthcheck:
      test: ["CMD", "curl", "--insecure", "-sf", "https://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    depends_on:
      k3s:
        condition: service_healthy

  rancher-init:
    image: dtzar/helm-kubectl:latest
    container_name: rancher-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # Wait for kubeconfig to be written by k3s
        until [ -f /output/kubeconfig.yaml ]; do
          echo "Waiting for kubeconfig..."; sleep 5;
        done
        # Rewrite server address to use the k3s container hostname
        sed 's|https://127.0.0.1:6443|https://k3s:6443|g' /output/kubeconfig.yaml > /tmp/kubeconfig.yaml
        # Add the Harvester UI Extension Helm repo and install
        helm repo add harvester-ui-extension https://harvester.github.io/harvester-ui-extension
        helm repo update
        helm upgrade --install harvester-ui-extension harvester-ui-extension/harvester-ui-extension \
          --kubeconfig /tmp/kubeconfig.yaml \
          --namespace cattle-ui-plugin-system \
          --create-namespace \
          --wait
        echo "Harvester UI Extension installed successfully."
    volumes:
      - ./output:/output
    networks:
      - rancher-k3s
    depends_on:
      rancher:
        condition: service_healthy

  k3s:
    image: rancher/k3s:${K3S_VERSION:-v1.31.4-k3s1}
    container_name: k3s
    command: server
    restart: unless-stopped
    privileged: true
    ports:
      - "${K3S_API_PORT:-6443}:6443"
      - "${K3S_HTTP_PORT:-8888}:80"
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=644
      - INSTALL_K3S_SKIP_DOWNLOAD=true
      - K3S_TOKEN=${K3S_TOKEN:-mysecrettoken}
    volumes:
      - k3s_data:/var/lib/rancher/k3s
      - ./output:/output
    networks:
      - rancher-k3s
    healthcheck:
      test: ["CMD", "/bin/kubectl", "get", "nodes", "--kubeconfig=/etc/rancher/k3s/k3s.yaml"]
      interval: 15s
      timeout: 8s
      retries: 10
      start_period: 35s
networks:
  rancher-k3s:
    driver: bridge
    name: rancher-k3s
volumes:
  rancher_data:
    driver: local
  k3s_data:
    driver: local
