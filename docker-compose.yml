services:
  k3s:
    image: rancher/k3s:v1.31.6-k3s1
    container_name: k3s-server
    privileged: true
    command:
      - server
      - --write-kubeconfig=/output/kubeconfig.yaml
      - --write-kubeconfig-mode=666
      - --tls-san=k3s
      - --node-name=k3s-server
    volumes:
      - k3s-data:/var/lib/rancher/k3s
      - ./k3s-config:/output:z
    ports:
      - "6443:6443"
      - "7010:443"
    healthcheck:
      test: ["CMD-SHELL", "kubectl get --raw='/readyz' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 50s
  rancher-deploy:
    image: alpine/k8s:1.31.3
    container_name: rancher-deploy
    depends_on:
      k3s:
        condition: service_healthy
    restart: "no"
    working_dir: /workspace
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      RANCHER_BOOTSTRAP_PASSWORD: ${RANCHER_BOOTSTRAP_PASSWORD:-adminadmin}
      SERVER_URL: ${SERVER_URL:-https://localhost:7010}
    volumes:
      - ./:/workspace:z
      - ./k3s-config:/kube:z
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "apk add --no-cache bash jq >/dev/null && cp /kube/kubeconfig.yaml /tmp/kubeconfig.yaml && sed -i 's/127.0.0.1/k3s/g' /tmp/kubeconfig.yaml && export KUBECONFIG=/tmp/kubeconfig.yaml && ./scripts/deploy_rancher.sh"
  rancher-restore:
    image: alpine/k8s:1.31.3
    container_name: rancher-restore
    depends_on:
      k3s:
        condition: service_healthy
    restart: "no"
    profiles: ["ops"]
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ./k3s-config:/kube
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "apk add --no-cache bash jq >/dev/null && cp /kube/kubeconfig.yaml /tmp/kubeconfig.yaml && sed -i 's/127.0.0.1/k3s/g' /tmp/kubeconfig.yaml && export KUBECONFIG=/tmp/kubeconfig.yaml && ./scripts/restore_rancher_config.sh"
  rancher-backup:
    image: alpine/k8s:1.31.3
    container_name: rancher-backup
    depends_on:
      k3s:
        condition: service_healthy
    restart: "no"
    profiles: ["ops"]
    working_dir: /workspace
    volumes:
      - ./:/workspace:z
      - ./k3s-config:/kube:z
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "apk add --no-cache bash jq >/dev/null && cp /kube/kubeconfig.yaml /tmp/kubeconfig.yaml && sed -i 's/127.0.0.1/k3s/g' /tmp/kubeconfig.yaml && export KUBECONFIG=/tmp/kubeconfig.yaml && ./scripts/backup_rancher_config.sh"
volumes:
  k3s-data:
